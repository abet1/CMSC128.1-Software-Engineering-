spring.application.name=rental-tracker
server.port=8080

# Local overrides (gitignored) — create application-local.properties to set secrets
spring.config.import=optional:classpath:application-local.properties

# Supabase PostgreSQL
spring.datasource.url=jdbc:postgresql://aws-0-ap-southeast-1.pooler.supabase.com:5432/postgres
spring.datasource.username=${SUPABASE_DB_USER}
spring.datasource.password=${SUPABASE_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA — schema already created via Supabase migrations, never modify
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Supabase JWT (OAuth2 Resource Server)
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=https://vemsxeowghyaysamzhxj.supabase.co/auth/v1/.well-known/jwks.json

# Supabase config
supabase.url=https://vemsxeowghyaysamzhxj.supabase.co
supabase.anon-key=${SUPABASE_ANON_KEY}
supabase.service-role-key=${SUPABASE_SERVICE_ROLE_KEY}
